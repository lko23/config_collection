[SERVICE]
    flush        1
    daemon       Off
    log_level    error
    parsers_file parsers.conf
    plugins_file plugins.conf
    http_server  Off
    http_listen  0.0.0.0
    http_port    2020
    storage.metrics on

# create folder and add one empty .conf file add custom conf if needed
@INCLUDE /etc/fluent-bit/conf.d/*.conf

[INPUT]
    Name              tail
    Path              /var/log/secure,/var/log/auth.log,/var/log/cron,/var/log/messages,/var/log/syslog
#    Path              /root/.bash_history,/home/*/.bash_history
#    Path              /var/log/maillog,/var/log/mail.log,/var/log/audit/audit.log,/var/log/dnf.log,/var/log/yum.log,/var/log/apt/history.log,/var/log/apt/term.log
#    Path              /var/log/**/*.log
    Exclude_Path      /var/log/btmp,/var/log/wtmp,/var/log/lastlog
    Tag               varlog.*
    Refresh_Interval  5
    Read_from_Head    False
    Read_newly_discovered_files_from_Head False
    DB                /var/log/fluent-bit.db
    Path_Key          log_path

[FILTER]
    Name    modify
    Match   varlog.*
    Add     host  ${HOSTNAME}
    Rename  log   _raw

[FILTER]
    Name          parser
    Match         varlog.*
    Key_Name      log_path
    Parser        service_from_path
    Reserve_Data  True
    Preserve_Key  False

[OUTPUT]
    Name        http
    Match       varlog.*
    Host        SomeIP
    Port        SomePort
    URI         /logpipeline/_bulk
    Format      json_lines
    Header      Content-Type application/json
    net.keepalive Off
    workers     1
    Retry_Limit False
