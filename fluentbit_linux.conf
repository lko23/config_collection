[SERVICE]
    flush        1
    daemon       Off
    log_level    error
    parsers_file parsers.conf
    plugins_file plugins.conf
    http_server  Off
    http_listen  0.0.0.0
    http_port    2020
    storage.metrics on
 
@INCLUDE /etc/fluent-bit/conf.d/*.conf
 
[INPUT]
    Name          tail
    Path          /var/log/secure,/var/log/auth.log,/var/log/cron,/var/log/messages,/var/log/syslog,/var/log/audit/audit.log,/var/log/maillog,/var/log/mail.log
    Exclude_Path  /var/log/btmp,/var/log/wtmp,/var/log/lastlog
    Tag           varlog
    Refresh_Interval 1
    Read_from_Head False
    DB            /etc/fluent-bit/varlog.db
    Path_Key      log_path
 
[FILTER]
    Name          parser
    Match         varlog
    Key_Name      log_path
    Parser        service_from_path
    Reserve_Data  True
    Preserve_Key  False
 
[FILTER]
    Name          modify
    Match         varlog
    Add           host ${HOSTNAME}
    Add           type varlog
    Rename        log _raw
 
[OUTPUT]
    Name          http
    Match         *
    Host          destination_ip
    Port          port
    URI           /pipeline/_bulk
    Format        json_lines
    Header        Content-Type application/json
    net.keepalive Off
    workers       1
    Retry_Limit   False
