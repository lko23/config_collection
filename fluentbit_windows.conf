[SERVICE]
    flush        1
    daemon       Off
    log_level    error
    parsers_file parsers.conf
    plugins_file plugins.conf
    http_server  Off
    http_listen  0.0.0.0
    http_port    2020
    storage.metrics on
 
@INCLUDE C:\Program Files\fluent-bit\conf\conf.d\*.conf
 
[INPUT]
    Name         winevtlog
    Channels     Application,Security,Setup,System,Windows PowerShell,Microsoft-Windows-TaskScheduler/Operational
    ignore_missing_channels true
    DB           winlog.sqlite
    Interval_Sec 1
    Read_Existing_Events false
    Tag          winevtlog
    Mem_Buf_Limit 100MB
    render_event_as_xml true
    read_limit_per_cycle 20MB
 
[FILTER]
    Name         parser
    Match        winevtlog
    Key_Name     System
    Parser       extract_service_name
    Reserve_Data On
    Preserve_Key On
 
[FILTER]
    Name         grep
    Match        winevtlog
    Exclude      System <EventID*>(4627|5156|5158)</EventID>
 
[FILTER]
    Name         modify
    Match        winevtlog
    Add          host ${HOSTNAME}
    Add          type winevtlog
    Rename       System _raw
    Remove       Message
    Remove       StringInserts
 
[OUTPUT]
    Name         http
    Match        *
    Host         destination_ip
    Port         port
    URI          /pipeline/_bulk
    Format       json_lines
    Header       Content-Type application/json
    net.keepalive Off
    workers      1
    Retry_Limit  False
